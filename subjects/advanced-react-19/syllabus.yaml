subject: "Advanced React 19"
language: en
time_budget_hours: 40
target_level: advanced
domain: web-development
prerequisites:
  - React 18+ experience
  - JavaScript/TypeScript fluency
learning_objectives:
  - "Architect production-grade React 19 applications"
  - "Deeply understand React 19 APIs: Actions, use(), Transitions, RSC"
  - "Optimize render performance through compiler, memo, and internals knowledge"
  - "Design concurrent-ready component trees with Suspense and transitions"
  - "Implement migration strategies from React 18 to 19"
  - "Build testable, error-resilient React 19 applications"
  - "Architect micro-frontend solutions with React 19 Module Federation"

modules:
  - id: 1
    name: "React 19 Architecture Overview"
    time_hours: 2
    prerequisites: []
    topics: [architecture, overview, migration]
  - id: 2
    name: "Actions Defined: useActionState, Server Actions"
    time_hours: 2.5
    prerequisites: [1]
    topics: [actions, useActionState, server-actions]
  - id: 3
    name: "use() Hook: Reading Promises and Context in Render"
    time_hours: 2
    prerequisites: [1]
    topics: [use-hook, promises, context]
  - id: 4
    name: "Transitions Deep: useTransition, startTransition, Batching"
    time_hours: 2
    prerequisites: [1]
    topics: [transitions, batching, concurrency]
  - id: 5
    name: "Common Hooks Mastery: useCallback, useMemo, useRef, useImperativeHandle"
    time_hours: 2
    prerequisites: [1]
    topics: [hooks, memoization, refs]
  - id: 6
    name: "useOptimistic: Optimistic Updates Architecture"
    time_hours: 2
    prerequisites: [4]
    topics: [optimistic, mutations, ux]
  - id: 7
    name: "Suspense Unleashed: Data Fetching, Streaming SSR, Boundaries"
    time_hours: 2.5
    prerequisites: [1]
    topics: [suspense, streaming, data-fetching]
  - id: 8
    name: "Server Components: Composition, Client Boundaries, Directives"
    time_hours: 2.5
    prerequisites: [1, 3]
    topics: [rsc, server-components, use-client]
  - id: 9
    name: "React 19 Form APIs: useFormStatus, Server Actions in Forms"
    time_hours: 2
    prerequisites: [2, 8]
    topics: [forms, useFormStatus, validation]
  - id: 10
    name: "React DOM Static APIs: prerender, renderToStaticNodeStream"
    time_hours: 1.5
    prerequisites: [8]
    topics: [ssr, static, prerender]
  - id: 11
    name: "Refs Revolution: forwardRef Deprecated, ref as Prop"
    time_hours: 1.5
    prerequisites: [5]
    topics: [refs, forwardRef, migration]
  - id: 12
    name: "Context Evolution: use(Context), Provider Patterns, Performance"
    time_hours: 2
    prerequisites: [3, 5]
    topics: [context, providers, performance]
  - id: 13
    name: "React Compiler: Forget, Auto Memoization, Migration"
    time_hours: 2.5
    prerequisites: [5]
    topics: [compiler, forget, auto-memo]
  - id: 14
    name: "Render Pipeline Internals: Fiber, Reconciliation, Bailout"
    time_hours: 2.5
    prerequisites: [4, 13]
    topics: [fiber, reconciliation, internals]
  - id: 15
    name: "Concurrent Rendering: Priorities, Interrupts, Suspense Transitions"
    time_hours: 2
    prerequisites: [4, 14]
    topics: [concurrent, priorities, interrupts]
  - id: 16
    name: "Profiling and Performance: Flamegraphs, Re-Render Analysis"
    time_hours: 2
    prerequisites: [14, 15]
    topics: [profiling, performance, devtools]
  - id: 17
    name: "Error Handling: Boundaries, Recoverable Errors, Logging"
    time_hours: 2
    prerequisites: [1]
    topics: [error-handling, boundaries, logging]
  - id: 18
    name: "Custom Hooks Patterns: Composition, Refactoring, Testing"
    time_hours: 2
    prerequisites: [5, 14]
    topics: [custom-hooks, composition, testing]
  - id: 19
    name: "Micro-Frontends: Module Federation, Shared State, Boundaries"
    time_hours: 2
    prerequisites: [8, 18]
    topics: [micro-frontends, module-federation, shared-state]
  - id: 20
    name: "Capstone: Production React 19 Application Architecture"
    time_hours: 3
    prerequisites: [13, 16, 17, 19]
    topics: [capstone, architecture, production]
