subject: "External Library Patterns"
language: en
time_budget_hours: 72
target_level: advanced
domain: web-development
prerequisites:
  - React 18+ experience
  - TypeScript fluency
  - Basic understanding of design patterns (adapter, facade, wrapper)
learning_objectives:
  - "Architect clean abstraction layers around third-party libraries"
  - "Apply adapter, facade, and wrapper patterns to decouple app code from vendor APIs"
  - "Design extensible wrapper components for data grids, forms, editors, and charts"
  - "Evaluate trade-offs between embedding, wrapping, and abstracting external libraries"
  - "Implement migration strategies between versions and vendors"
  - "Build reusable library interop patterns across UI, data, and rendering domains"
  - "Integrate testing, build, and deployment tooling into React 19 workflows"
  - "Design type-safe API layers with tRPC and GraphQL Apollo Client"
  - "Implement media, search, and AI streaming patterns with modern SDKs"

