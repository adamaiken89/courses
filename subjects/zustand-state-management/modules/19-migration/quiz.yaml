- id: "19.1"
  question: "What is the single largest cause of state management migration failure?"
  options:
    A: "Wrong choice of state management library"
    B: "Big bang rewrite"
    C: "Insufficient test coverage"
    D: "Team resistance to change"
  answer: B
  explanation: "Big bang rewrites create risk proportional to codebase size. Testing impossible. Rollback impossible. Incremental migration (strangler fig, module-by-module) limits risk per step."
  difficulty: 1
  tags: [concept]

- id: "19.2"
  question: "Which migration strategy lets you toggle between old and new implementation per feature?"
  options:
    A: "Module-by-module"
    B: "Strangler fig"
    C: "Feature flag"
    D: "Parallel run"
  answer: C
  explanation: "Feature flags wrap old and new implementations behind a boolean. Flip flag to switch per feature. Rollback flips flag back. Replaces code at runtime, not at deployment."
  difficulty: 1
  tags: [terminology]

- id: "19.3"
  question: "When migrating useReducer to Zustand, what does each reducer case become?"
  options:
    A: "A switch statement in a dispatch method"
    B: "A separate store"
    C: "A store method that calls set()"
    D: "An action type constant"
  answer: C
  explanation: "Each reducer case becomes a store method. The switch statement and action types are replaced by individual functions like addTodo, toggleTodo, removeTodo. The logic stays identical, only the container changes."
  difficulty: 1
  tags: [concept]

- id: "19.4"
  question: "During migration from Context to Zustand, a component accidentally uses both useContext(AuthContext) and useAuthStore(). What problem occurs?"
  options:
    A: "TypeScript compilation error"
    B: "Infinite re-render loop"
    C: "State values diverge between the two systems"
    D: "Bundle size doubles"
  answer: C
  explanation: "Context and Zustand store are independent copies. Mutating one does not update the other. A component reading both may see stale data from one system. Prevent with lint rules or by hydrating Zustand store from context on init."
  difficulty: 2
  tags: [application]

- id: "19.5"
  question: "What is the Zustand equivalent of Redux Toolkit's createAsyncThunk lifecycle (pending/fulfilled/rejected)?"
  options:
    A: "Extra reducers in createSlice"
    B: "Explicit set() calls inside the async action method"
    C: "Zustand middleware pipeline"
    D: "Auto-generated by the devtools middleware"
  answer: B
  explanation: "Zustand has no createAsyncThunk. The lifecycle is explicit: set({ loading: true }) before API call, set({ loading: false, data }) on success, set({ loading: false, error }) on failure. More code but more control. Named third parameter to set() enables DevTools tracing per lifecycle phase."
  difficulty: 2
  tags: [comparison]

- id: "19.6"
  question: "A team migrates a 50k LOC Redux app module-by-module. What is the recommended first module to migrate?"
  options:
    A: "Auth — because every component reads it"
    B: "Checkout — because it generates revenue"
    C: "Smallest independent feature (e.g., theme toggle, notifications)"
    D: "The most complex reducer with 30 action types"
  answer: C
  explanation: "Start small. First module: low risk, teaches team the pattern, builds confidence. Auth is high-risk (every component depends on it). Complex reducers increase migration surface. Theme toggle or notification preferences are independent and safe."
  difficulty: 2
  tags: [application]

- id: "19.7"
  question: "Dual-write during migration means:"
  options:
    A: "Writing both unit and integration tests for each store"
    B: "Maintaining both old and new documentation"
    C: "Processing every action in both old and new stores and comparing outputs"
    D: "Assigning two developers to each migration task"
  answer: C
  explanation: "Dual-write sends the same action to both Redux and Zustand stores, then compares resulting state. Divergence indicates logic mismatch. Used in staging to build confidence before cutover. Not suitable for production due to double-processing overhead."
  difficulty: 1
  tags: [concept]

- id: "19.8"
  question: "A migration currently has both old Redux store and new Zustand store active. Both need to read the user's auth token. What is the recommended approach?"
  options:
    A: "Duplicate token in both stores, keep them in sync manually"
    B: "Create a bridge via Redux store subscription that updates Zustand store"
    C: "Make Zustand the single source of truth and deprecate Redux auth immediately"
    D: "Wrap all components in a provider that passes token via props"
  answer: B
  explanation: "Bridge via subscription: Redux store subscribes to changes, Zustand store.setState() on auth token change. This prevents divergence without requiring immediate full migration of auth. Redux remains owner during migration; Zustand is read-only replica."
  difficulty: 3
  tags: [scenario]

- id: "19.9"
  question: "After migrating a Redux slice with 200 reducer tests, what is the recommended test strategy?"
  options:
    A: "Delete all 200 tests — they are covered by the new store"
    B: "Write 200 parity tests, confirm logic matches, then reduce to meaningful subset"
    C: "Only test components, not stores"
    D: "Keep all 200 tests running against both old and new stores permanently"
  answer: B
  explanation: "Parity tests confirm old and new produce same outputs for same inputs. After confidence builds (2 weeks without divergence), reduce to ~50 meaningful integration tests. Redundant tests are maintenance burden. Deleting without parity validation risks undiscovered logic differences."
  difficulty: 2
  tags: [application]

- id: "19.10"
  question: "A team maintains two state management systems during migration. Which risk is the code review checklist primarily designed to prevent?"
  options:
    A: "Performance regression in the new Zustand store"
    B: "Mixed patterns — same component accessing both old and new state management"
    C: "Missing TypeScript types for the new store"
    D: "Inadequate test coverage for new features"
  answer: B
  explanation: "Mixed patterns (a component using both useContext and useStore) cause state divergence, bugs, and confused developers. Code review checklist explicitly catches this. Other concerns (performance, types, tests) are important but secondary. Mixed access is the most common and dangerous migration bug."
  difficulty: 3
  tags: [scenario]
