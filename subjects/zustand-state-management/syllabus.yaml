subject: "Zustand State Management"
language: en
time_budget_hours: 40
target_level: advanced
domain: web-development
prerequisites:
  - React 18+ experience
  - Familiarity with useState, useReducer, useContext
learning_objectives:
  - "Understand when and why Zustand replaces native React state tools"
  - "Design store architectures that separate logic from hooks"
  - "Implement public vs internal API patterns for encapsulated stores"
  - "Apply Redux-like patterns within Zustand stores"
  - "Identify and fix Zustand weaknesses: over-subscription, debugging, serialization"
  - "Migrate existing state management (Context/Redux/useReducer) to Zustand"
  - "Build testable, maintainable state layers"

modules:
  - id: 1
    name: "Why Zustand: React State Evolution"
    time_hours: 2
    prerequisites: []
    topics: [motivation, history, comparison]
  - id: 2
    name: "Zustand vs useState: When Local State Isnt Enough"
    time_hours: 2
    prerequisites: [1]
    topics: [useState, local-state, limits]
  - id: 3
    name: "Zustand vs useReducer: Reducers Without Boilerplate"
    time_hours: 2
    prerequisites: [1]
    topics: [useReducer, reducers, simplicity]
  - id: 4
    name: "Zustand vs useContext: Re-Renders, Provider Hell"
    time_hours: 2
    prerequisites: [1]
    topics: [useContext, providers, performance]
  - id: 5
    name: "Store Architecture: Separating Logic from Hooks"
    time_hours: 2.5
    prerequisites: [2, 3, 4]
    topics: [architecture, separation, hooks]
  - id: 6
    name: "Public API vs Internal API: Store Encapsulation"
    time_hours: 2
    prerequisites: [5]
    topics: [encapsulation, api-design, privacy]
  - id: 7
    name: "Redux Pattern in Zustand: Reducers, Dispatch, Actions"
    time_hours: 2.5
    prerequisites: [1, 3]
    topics: [redux-pattern, reducers, actions]
  - id: 8
    name: "Slices Pattern: Scalable Store Composition"
    time_hours: 2
    prerequisites: [5, 7]
    topics: [slices, composition, scalability]
  - id: 9
    name: "Selector Architecture: Granular Subscriptions, Optimization"
    time_hours: 2.5
    prerequisites: [5]
    topics: [selectors, subscriptions, optimization]
  - id: 10
    name: "Middleware: Immer, Persist, Custom Chains"
    time_hours: 2
    prerequisites: [5]
    topics: [middleware, immer, persist]
  - id: 11
    name: "Derived State: Computed Values, Selector Composition"
    time_hours: 2
    prerequisites: [9]
    topics: [derived-state, computed, composition]
  - id: 12
    name: "Testing Zustand Stores: Pure Logic with useBoundStore"
    time_hours: 2
    prerequisites: [5, 6]
    topics: [testing, vitest, mocks]
  - id: 13
    name: "Zustand Weakness 1: Over-Subscription and Debugging"
    time_hours: 2
    prerequisites: [9]
    topics: [weaknesses, over-subscription, debugging]
  - id: 14
    name: "Solve Weakness 1: Atomic Stores, Selector Stability"
    time_hours: 2
    prerequisites: [13]
    topics: [atomic-stores, selector-stability, patterns]
  - id: 15
    name: "Weaknesses 2 and 3: Serialization, Hydration Gotchas"
    time_hours: 2
    prerequisites: [10, 13]
    topics: [serialization, hydration, pitfalls]
  - id: 16
    name: "Solve Weaknesses 2 and 3: Middleware Orchestration, Logging"
    time_hours: 2
    prerequisites: [10, 15]
    topics: [middleware, orchestration, logging]
  - id: 17
    name: "Zustand in Microfrontends: Multiple Stores, Shared State"
    time_hours: 2
    prerequisites: [8]
    topics: [microfrontends, multi-store, shared-state]
  - id: 18
    name: "Zustand with Server Components: Client Store Boundaries"
    time_hours: 2
    prerequisites: [8]
    topics: [rsc, server-components, boundaries]
  - id: 19
    name: "Migration: useReducer, Context, Redux Toolkit to Zustand"
    time_hours: 2.5
    prerequisites: [5]
    topics: [migration, strategies, incremental]
  - id: 20
    name: "Capstone: Architecture Decision Record"
    time_hours: 2.5
    prerequisites: [16, 17, 19]
    topics: [adr, decision-making, architecture]
