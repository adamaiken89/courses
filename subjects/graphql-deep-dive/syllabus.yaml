subject: "GraphQL Deep Dive"
language: en
time_budget_hours: 40
target_level: intermediate-to-advanced
domain: api-development
prerequisites:
  - TypeScript/JavaScript fundamentals
  - REST API experience
  - Basic HTTP knowledge
learning_objectives:
  - "Design GraphQL schemas using SDL with all type system features"
  - "Build efficient resolvers with proper data loading patterns"
  - "Optimize query performance through cost analysis, pagination, and DataLoader"
  - "Implement layered caching strategies: client normalized cache, server CDN, distributed cache"
  - "Architect production-grade federated supergraphs with Apollo Federation"
  - "Compare REST vs gRPC vs GraphQL across data model, error handling, caching, and migration"
  - "Apply security and observability best practices in production GraphQL"

modules:
  - id: 1
    name: "Schema & Type System"
    time_hours: 2
    prerequisites: []
    topics: [sdl, scalar-types, object-types, enums, interfaces, unions, input-types, directives]
  - id: 2
    name: "Resolvers Deep Dive"
    time_hours: 2
    prerequisites: [1]
    topics: [resolver-signature, context, data-sources, root-value, middleware, error-propagation]
  - id: 3
    name: "Queries"
    time_hours: 2
    prerequisites: [1]
    topics: [fields, arguments, variables, fragments, inline-fragments, directives, aliases]
  - id: 4
    name: "Mutations"
    time_hours: 2
    prerequisites: [1, 3]
    topics: [input-types, mutation-payloads, error-patterns, partial-success, idempotency]
  - id: 5
    name: "Subscriptions"
    time_hours: 2
    prerequisites: [1, 3]
    topics: [websocket-transport, event-sourcing, back-pressure, auth, graphql-over-sse]
  - id: 6
    name: "N+1 & DataLoader"
    time_hours: 2.5
    prerequisites: [2, 3]
    topics: [n-plus-one, dataloader-batching, per-request-cache, cache-priming, cache-keys]
  - id: 7
    name: "Query Cost Analysis"
    time_hours: 2
    prerequisites: [3]
    topics: [depth-limiting, complexity-scoring, rate-limiting, query-timeouts, persisted-queries]
  - id: 8
    name: "Connection Pattern"
    time_hours: 2
    prerequisites: [3, 6]
    topics: [cursor-pagination, relay-spec, edges-nodes-pageinfo, offset-vs-cursor]
  - id: 9
    name: "Client Normalized Cache"
    time_hours: 2.5
    prerequisites: [3]
    topics: [normalized-store, type-policies, garbage-collection, persistence, cache-redirect]
  - id: 10
    name: "Client Cache Policies"
    time_hours: 2
    prerequisites: [9]
    topics: [cache-first, cache-and-network, network-only, write-policies, optimistic-response]
  - id: 11
    name: "Server Cache"
    time_hours: 2.5
    prerequisites: [7, 8]
    topics: [cdn-caching, automatic-persisted-queries, response-caching, redis, write-behind]
  - id: 12
    name: "Cache Invalidation"
    time_hours: 2
    prerequisites: [11]
    topics: [webhooks, ttl-strategies, pub-sub-invalidation, stale-while-revalidate, cache-warming]
  - id: 13
    name: "Federation Design"
    time_hours: 2
    prerequisites: [1, 2, 3]
    topics: [supergraph-topology, subgraph-boundaries, apollo-router, gateway]
  - id: 14
    name: "Federation Entity Composition"
    time_hours: 2.5
    prerequisites: [13]
    topics: [key, external, requires, provides, entity-resolvers, reference-resolution]
  - id: 15
    name: "Federation Cross-Cutting"
    time_hours: 2
    prerequisites: [14]
    topics: [auth-propagation, error-handling, schema-governance, gradual-adoption, cost-in-federation]
  - id: 16
    name: "REST vs GraphQL vs RPC: Data Fetching"
    time_hours: 2
    prerequisites: [1, 2]
    topics: [over-fetching, under-fetching, waterfall-requests, contract-rigidity, versioning]
  - id: 17
    name: "REST vs GraphQL vs RPC: Error & Caching"
    time_hours: 2
    prerequisites: [16]
    topics: [http-status-codes, graphql-errors, cache-semantics, caching-architecture-comparison]
  - id: 18
    name: "REST vs GraphQL vs RPC: Migration & TCO"
    time_hours: 2
    prerequisites: [17]
    topics: [rest-to-graphql-migration, polyglot-apis, team-skill, tooling, operational-cost]
  - id: 19
    name: "Observability"
    time_hours: 2
    prerequisites: [2, 3]
    topics: [tracing, apollo-studio, opentelemetry, logging, metrics, error-tracking]
  - id: 20
    name: "Security"
    time_hours: 2
    prerequisites: [7, 19]
    topics: [depth-limiting, authz-field-level, persisted-queries-allowlist, introspection, csrf, rate-limiting]
